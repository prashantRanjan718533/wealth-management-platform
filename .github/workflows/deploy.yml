name: Deploy to GitHub Pages

# Trigger: run this workflow whenever code is pushed to main,
# or manually from the Actions tab (workflow_dispatch)
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions the workflow's GITHUB_TOKEN needs to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment, skip queued runs, but don't
# cancel an in-progress run to avoid leaving a Pages deploy half-done
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: install deps, build the Vite app, upload the dist/ folder as an artifact
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  # Job 2: take the artifact from job 1 and publish it to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4